name: vocaloflow
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pytorch>=2.2
  - pytorch-cuda=12.1
  - torchaudio
  - numpy
  - scipy
  - matplotlib
  - tqdm
  - pandas
  - pip
  - pip:
    - tensorboard
    - einops
    # --- inference pipeline ---
    - librosa
    - soundfile
    - pyyaml
    - pythonnet          # OpenUTAU .ustx rendering via C# DLL
    # --- SoulX-Singer g2p (cross-project import) ---
    - g2pM               # Mandarin grapheme-to-phoneme
    - g2p-en             # English grapheme-to-phoneme
    - ToJyutping         # Cantonese romanization
    # --- experiment tracking ---
    - wandb
