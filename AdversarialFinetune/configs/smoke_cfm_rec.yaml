# Smoke test: CFM anchor + L1 reconstruction on 4-step Euler ODE.
# No discriminator, no feature matching.  Lets us verify the ODE unroll
# produces useful training signal before turning on the GAN.

pretrained_run: 4-16-wavenet
pretrained_step: 0

enable_cfm: true
enable_reconstruction: true
enable_adversarial: false
enable_feature_matching: false

lambda_cfm: 1.0
lambda_rec: 1.0

ode_num_steps: 4
ode_method: euler

batch_size: 8
total_finetune_steps: 500
log_every: 25
val_every: 250
eval_every: 500
save_every: 500
