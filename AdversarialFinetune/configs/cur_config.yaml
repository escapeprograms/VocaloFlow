# Experiment 3b: DiT discriminator, no reconstruction loss (4-17-dit-disc)
# Starts from 4-16-wavenet pretrained checkpoint.
# Drops L1 reconstruction loss; uses DiT-based discriminator (~13M params).
# 2 discriminator steps per generator step with logit centering.

pretrained_run: 4-16-wavenet
pretrained_step: 0

enable_cfm: true
enable_reconstruction: false
enable_adversarial: true
enable_feature_matching: true

lambda_cfm: 1.0
lambda_rec: 0.0
lambda_adv: 1.0
lambda_fm: 0.0

ode_num_steps: 4
ode_method: euler
ode_grad_checkpoint: false

disc_warmup_steps: 3000
adv_ramp_steps: 2000

gen_learning_rate: 2.0e-5
disc_learning_rate: 2.0e-4
reset_gen_optimizer: true

batch_size: 8
total_finetune_steps: 30000
log_every: 50
val_every: 1000
eval_every: 3000
save_every: 5000

# DiT discriminator
disc_type: dit
disc_dit_num_blocks: 4
disc_dit_hidden_dim: 512
disc_dit_num_heads: 8
disc_dit_ffn_dim: 2048
disc_dit_feature_blocks: [1, 3]
disc_steps_per_gen: 2
logit_center_weight: 0.01
