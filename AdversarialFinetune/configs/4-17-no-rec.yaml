# Experiment 3: No reconstruction loss (4-17-no-rec)
# Starts from 4-16-wavenet pretrained checkpoint.
# Drops L1 reconstruction loss; raises lambda_adv to 1.0.

pretrained_run: 4-16-wavenet
pretrained_step: 0

enable_cfm: true
enable_reconstruction: false
enable_adversarial: true
enable_feature_matching: true

lambda_cfm: 1.0
lambda_rec: 0.0
lambda_adv: 1.0
lambda_fm: 2.0

ode_num_steps: 4
ode_method: euler
ode_grad_checkpoint: false

disc_warmup_steps: 3000
adv_ramp_steps: 2000

gen_learning_rate: 2.0e-5
disc_learning_rate: 2.0e-4
reset_gen_optimizer: true

batch_size: 8
total_finetune_steps: 30000
log_every: 50
val_every: 1000
eval_every: 3000
save_every: 5000
